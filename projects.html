<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>摄影专辑｜Photography Projects</title>

  <style>
    :root{
      /* light theme */
      --bg:#f4f5f7;
      --bg2:#eef0f3;
      --card:rgba(255,255,255,.72);
      --text:#141518;
      --muted:#5f636b;
      --line:rgba(20,21,24,.10);
      --radius:20px;
      --shadow:0 18px 50px rgba(0,0,0,.10);
    }

    body{
      margin:0;
      background:
        radial-gradient(1200px 800px at 20% 10%, #ffffff 0%, rgba(255,255,255,0) 60%),
        radial-gradient(1000px 700px at 80% 20%, #ffffff 0%, rgba(255,255,255,0) 55%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
      color:var(--text);
      font-family: ui-serif, Georgia, "Times New Roman", "Noto Serif SC", "Songti SC", serif;
      line-height:1.9;
    }

    /* topbar */
    .topbar{
      position:sticky; top:0;
      background:rgba(244,245,247,.70);
      backdrop-filter: blur(10px);
      border-bottom:1px solid var(--line);
      padding:12px 16px;
      z-index:10;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .topbar a{
      color:#2b2f36;
      text-decoration:none;
      border:1px solid var(--line);
      background:rgba(255,255,255,.70);
      padding:8px 12px;
      border-radius:999px;
      font-size:14px;
      font-family: ui-sans-serif, system-ui, -apple-system, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
    }
    .topbar a:hover{
      background:#fff;
      border-color:rgba(20,21,24,.18);
    }

    .wrap{
      max-width:1320px;               /* ✅ 给 frame 更大空间 */
      margin:0 auto;
      padding:22px 18px 90px;
    }

    /* ===== Main layout ===== */
    .layout{
      display:grid;
      grid-template-columns: 1fr 270px;
      gap:36px;                       /* ✅ 右侧 icon 不要贴太近 */
      align-items:start;
      margin-top:40px;
    }
    @media (max-width: 980px){
      .layout{ grid-template-columns: 1fr; }
    }

    /* ===== Left header (center relative to frame) ===== */
    .leftHeader{
      text-align:center;              /* ✅ 相对左栏居中 = 相对 slide frame 居中 */
      padding:10px 0 16px;
    }
    .title-zh{
      font-size:42px;
      font-weight:700;
      letter-spacing:1px;
      margin:0 0 6px;
    }
    .title-en{
      margin:0;
      color:var(--muted);
      font-size:18px;
      letter-spacing:.3px;
      font-family: ui-sans-serif, system-ui, -apple-system, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
    }
    .rule{
      width:90px;
      height:1px;
      margin:14px auto 6px;
      background:rgba(20,21,24,.22);
    }
    @media (max-width: 820px){
      .title-zh{ font-size:34px; }
      .title-en{ font-size:16px; }
    }

    /* ===== Slideshow frame ===== */
    .frame{
      position:relative;
      border-radius:var(--radius);
      overflow:hidden;
      border:1px solid rgba(20,21,24,.10);
      box-shadow:var(--shadow);
      background:#000;
      aspect-ratio: 16 / 9;
      min-height: 560px;              /* ✅ frame 更大 */
    }
    @media (max-width: 900px){
      .frame{ min-height: 380px; }
    }

    .slide{
      position:absolute;
      inset:0;
      opacity:0;
      transition: opacity .5s ease;
    }
    .slide.active{ opacity:1; }

    .slide img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .overlay{
      position:absolute;
      inset:0;
      /* 保持底部文字可读 */
      background: linear-gradient(to top, rgba(0,0,0,.62), rgba(0,0,0,.10) 58%, rgba(0,0,0,.08));
      pointer-events:none;
    }

    /* caption */
    .caption{
      position:absolute;
      left:22px;
      right:22px;
      bottom:18px;
      z-index:2;
    }

    /* ✅ 去掉左下角黑字“水印/标题”感：主标题隐藏，只留短句 */
    .cap-title{
      display:none;
    }

    .cap-line{
      width:88px;
      height:2px;
      background:rgba(255,255,255,.55);
      margin:0 0 10px;
      border-radius:999px;
      display:none; /* 配合隐藏标题一起关掉，更干净 */
    }

    .cap-sub{
      margin:0;
      color:rgba(255,255,255,.90);
      font-size:16px;
      line-height:1.55;
      text-shadow: 0 8px 22px rgba(0,0,0,.45);
      font-family: ui-sans-serif, system-ui, -apple-system, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
      max-width: 78%;
    }

    /* prev/next */
    .ctrl{
      position:absolute;
      inset:0;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:0 12px;
      z-index:3;
      pointer-events:none;
    }
    .btn{
      pointer-events:auto;
      width:46px; height:46px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(0,0,0,.28);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      transition: transform .12s ease, background .12s ease, border .12s ease;
      user-select:none;
      font-family: ui-sans-serif, system-ui, -apple-system, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
      font-size:24px;
    }
    .btn:hover{
      transform: translateY(-1px);
      background:rgba(0,0,0,.40);
      border:1px solid rgba(255,255,255,.30);
    }

    .dots{
      position:absolute;
      left:0; right:0;
      bottom:12px;
      display:flex;
      justify-content:center;
      gap:8px;
      z-index:3;
      pointer-events:auto;
    }
    .dot{
      width:8px; height:8px;
      border-radius:999px;
      background:rgba(255,255,255,.35);
      border:1px solid rgba(255,255,255,.12);
      cursor:pointer;
      transition: transform .12s ease, background .12s ease;
    }
    .dot.active{
      background:rgba(255,255,255,.78);
      transform: scale(1.15);
    }

    /* enlarge button inside frame */
    .enlarge{
      position:absolute;
      right:14px;
      bottom:14px;
      z-index:4;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(0,0,0,.28);
      color:#fff;
      padding:10px 12px;
      cursor:pointer;
      user-select:none;
      font-family: ui-sans-serif, system-ui, -apple-system, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
      font-size:13px;
    }
    .enlarge:hover{
      background:rgba(0,0,0,.45);
      border-color: rgba(255,255,255,.30);
    }

    /* ===== Right side icons ===== */
    .side{
      border:1px solid var(--line);
      border-radius:16px;
      padding:16px;
      background:rgba(255,255,255,.60);
      box-shadow: 0 10px 30px rgba(0,0,0,.06);
      backdrop-filter: blur(10px);
    }
    .side h3{
      margin:0 0 12px;
      font-size:13px;
      color:var(--muted);
      font-family: ui-sans-serif, system-ui, -apple-system, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
      letter-spacing:.2px;
    }
    .albums{
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .album-btn{
      display:flex;
      align-items:center;
      gap:10px;
      padding:12px 12px;
      border-radius:14px;
      cursor:pointer;
      border:1px solid rgba(20,21,24,.10);
      background:rgba(255,255,255,.75);
      transition: transform .12s ease, background .12s ease, border .12s ease;
      user-select:none;
    }
    .album-btn:hover{
      transform: translateY(-1px);
      background:#fff;
      border-color: rgba(20,21,24,.16);
    }
    .album-btn.active{
      background:#fff;
      border-color: rgba(20,21,24,.22);
      box-shadow: 0 8px 22px rgba(0,0,0,.08);
    }
    .ico{
      width:34px; height:34px;
      border-radius:12px;
      background:rgba(20,21,24,.06);
      border:1px solid rgba(20,21,24,.10);
      display:flex;
      align-items:center;
      justify-content:center;
      font-family: ui-sans-serif, system-ui, -apple-system, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
      font-weight:700;
      color:#1f232a;
    }
    .album-text{
      display:flex;
      flex-direction:column;
      line-height:1.25;
    }
    .album-text b{
      font-family: ui-sans-serif, system-ui, -apple-system, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
      font-size:14px;
      color:#1d2128;
    }
    .album-text span{
      font-family: ui-sans-serif, system-ui, -apple-system, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
      font-size:12px;
      color:var(--muted);
    }

    /* ===== Fullscreen modal ===== */
    .modal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.92);
      display:none;
      z-index:999;
    }
    .modal.open{ display:block; }

    .modal-inner{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }
    .modal-frame{
      position:relative;
      width:min(1320px, 96vw);
      aspect-ratio: 16/9;
      background:#000;
      border-radius:18px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.12);
      box-shadow:0 18px 60px rgba(0,0,0,.55);
    }

    .close{
      position:absolute;
      top:16px;
      right:16px;
      z-index:5;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(0,0,0,.35);
      color:#fff;
      padding:10px 12px;
      cursor:pointer;
      font-family: ui-sans-serif, system-ui, -apple-system, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
      font-size:13px;
    }
    .close:hover{ background:rgba(0,0,0,.55); border-color:rgba(255,255,255,.30); }

    footer{
      margin-top:22px;
      padding-top:14px;
      border-top:1px solid var(--line);
      text-align:center;
      color:var(--muted);
      font-size:13px;
      font-family: ui-sans-serif, system-ui, -apple-system, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
    }
  </style>
</head>

<body>
  <div class="topbar">
    <a href="index.html">← 返回主页 Home</a>
  </div>

  <div class="wrap">
    <div class="layout">

      <!-- LEFT: header + slideshow frame -->
      <section>
        <header class="leftHeader">
          <h1 class="title-zh">摄影专辑</h1>
          <p class="title-en">Photography Projects</p>
          <div class="rule"></div>
          <p class="title-en" style="margin-top:6px;">以系列方式呈现影像与文字</p>
        </header>

        <div class="frame" id="mainFrame" aria-label="Project slideshow">
          <!-- slides injected by JS -->
          <div class="caption" aria-live="polite">
            <div class="cap-title" id="capTitle"></div>
            <div class="cap-line"></div>
            <p class="cap-sub" id="capSub"></p>
          </div>

          <div class="ctrl">
            <div class="btn" id="prevBtn" aria-label="Previous slide">‹</div>
            <div class="btn" id="nextBtn" aria-label="Next slide">›</div>
          </div>

          <div class="dots" id="dots" aria-label="Slide dots"></div>

          <div class="enlarge" id="enlargeBtn" title="Enlarge / Fullscreen">Enlarge ⤢</div>
        </div>

        <footer>© Dr Weihong Liu · Digital Studio</footer>
      </section>

      <!-- RIGHT: album icons -->
      <aside class="side">
        <h3>切换专辑</h3>
        <div class="albums">
          <div class="album-btn active" data-album="albumA" id="btnA">
            <div class="ico">A</div>
            <div class="album-text">
              <b>慢门影像专辑</b>
              <span>Slow Shutter Project</span>
            </div>
          </div>

          <div class="album-btn" data-album="albumB" id="btnB">
            <div class="ico">B</div>
            <div class="album-text">
              <b>专辑 B</b>
              <span>Album B (placeholder)</span>
            </div>
          </div>
        </div>
      </aside>

    </div>
  </div>

  <!-- FULLSCREEN MODAL -->
  <div class="modal" id="modal" aria-hidden="true">
    <button class="close" id="closeBtn">Close ✕</button>
    <div class="modal-inner">
      <div class="modal-frame" id="modalFrame" aria-label="Fullscreen slideshow">
        <!-- slides injected by JS (same album) -->
        <div class="caption" aria-live="polite">
          <div class="cap-title" id="mCapTitle"></div>
          <div class="cap-line"></div>
          <p class="cap-sub" id="mCapSub"></p>
        </div>

        <div class="ctrl">
          <div class="btn" id="mPrevBtn" aria-label="Previous slide">‹</div>
          <div class="btn" id="mNextBtn" aria-label="Next slide">›</div>
        </div>

        <div class="dots" id="mDots" aria-label="Slide dots"></div>
      </div>
    </div>
  </div>

  <script>
    // ===== 1) 配置专辑（已替换为你现在的文件名/路径）=====
    // 你目前图片在：images/slow/slowshutter1.jpg / 2 / 3
    const ALBUMS = {
      albumA: {
        nameZh: "慢门影像专辑",
        nameEn: "Slow Shutter Project",
        slides: [
          { src: "images/slow/slowshutter1.jpg", title: "Hopeful Water",  sub: "水与光之间，世界在时间中缓缓流动。" },
          { src: "images/slow/slowshutter2.jpg", title: "Majestic Bird",  sub: "长曝光让海面沉静，结构与光线被拉长。" },
          { src: "images/slow/slowshutter3.jpg", title: "City in Dusk",   sub: "暮色与灯火交叠，城市在缓慢里呼吸。" }
        ]
      },
      albumB: {
        nameZh: "专辑 B",
        nameEn: "Album B",
        slides: [
          { src: "images/projects/albumB/01.jpg", title: "Album B — 01", sub: "这里放专辑B的短句。" },
          { src: "images/projects/albumB/02.jpg", title: "Album B — 02", sub: "这里放专辑B的短句。" },
          { src: "images/projects/albumB/03.jpg", title: "Album B — 03", sub: "这里放专辑B的短句。" }
        ]
      }
    };

    // ===== 2) 通用渲染函数（主框 & 全屏框各一套）=====
    function makeSlideshow(opts){
      const {
        mountEl, capTitleEl, capSubEl, dotsEl,
        prevBtn, nextBtn,
        onSlideChange
      } = opts;

      let albumKey = "albumA";
      let idx = 0;
      let slidesDom = [];

      function clearSlides(){
        slidesDom.forEach(n => n.remove());
        slidesDom = [];
      }

      function renderSlides(){
        clearSlides();
        const slides = ALBUMS[albumKey].slides;

        slides.forEach((s, i) => {
          const wrap = document.createElement("div");
          wrap.className = "slide" + (i === idx ? " active" : "");
          wrap.innerHTML = `
            <img src="${s.src}" alt="${ALBUMS[albumKey].nameZh} ${i+1}">
            <div class="overlay"></div>
          `;
          mountEl.appendChild(wrap);
          slidesDom.push(wrap);
        });

        renderDots();
        applyCaption();
      }

      function renderDots(){
        dotsEl.innerHTML = "";
        const slides = ALBUMS[albumKey].slides;
        slides.forEach((_, i) => {
          const d = document.createElement("div");
          d.className = "dot" + (i === idx ? " active" : "");
          d.addEventListener("click", () => go(i));
          dotsEl.appendChild(d);
        });
      }

      function applyCaption(){
        const s = ALBUMS[albumKey].slides[idx];
        capTitleEl.textContent = s.title || "";
        capSubEl.textContent = s.sub || "";
        if (typeof onSlideChange === "function") onSlideChange(albumKey, idx);
      }

      function go(i){
        const slides = ALBUMS[albumKey].slides;
        const next = (i + slides.length) % slides.length;

        slidesDom[idx].classList.remove("active");
        idx = next;
        slidesDom[idx].classList.add("active");

        renderDots();
        applyCaption();
      }

      function next(){ go(idx + 1); }
      function prev(){ go(idx - 1); }

      prevBtn.addEventListener("click", prev);
      nextBtn.addEventListener("click", next);

      return {
        setAlbum(key){
          if (!ALBUMS[key]) return;
          albumKey = key;
          idx = 0;
          renderSlides();
        },
        getState(){ return { albumKey, idx }; },
        go,
        next,
        prev,
        render(){ renderSlides(); }
      };
    }

    // ===== 3) 初始化：主框 slideshow =====
    const mainFrame = document.getElementById("mainFrame");
    const mainShow = makeSlideshow({
      mountEl: mainFrame,
      capTitleEl: document.getElementById("capTitle"),
      capSubEl: document.getElementById("capSub"),
      dotsEl: document.getElementById("dots"),
      prevBtn: document.getElementById("prevBtn"),
      nextBtn: document.getElementById("nextBtn"),
      onSlideChange: () => {}
    });
    mainShow.render();

    // ===== 4) 右侧 icon：切换专辑 =====
    const btnA = document.getElementById("btnA");
    const btnB = document.getElementById("btnB");

    function setActiveBtn(key){
      [btnA, btnB].forEach(b => b.classList.remove("active"));
      (key === "albumA" ? btnA : btnB).classList.add("active");
    }

    btnA.addEventListener("click", () => {
      setActiveBtn("albumA");
      mainShow.setAlbum("albumA");
    });
    btnB.addEventListener("click", () => {
      setActiveBtn("albumB");
      mainShow.setAlbum("albumB");
    });

    // ===== 5) 全屏 modal slideshow（enlarge）=====
    const modal = document.getElementById("modal");
    const enlargeBtn = document.getElementById("enlargeBtn");
    const closeBtn = document.getElementById("closeBtn");

    const modalFrame = document.getElementById("modalFrame");
    const modalShow = makeSlideshow({
      mountEl: modalFrame,
      capTitleEl: document.getElementById("mCapTitle"),
      capSubEl: document.getElementById("mCapSub"),
      dotsEl: document.getElementById("mDots"),
      prevBtn: document.getElementById("mPrevBtn"),
      nextBtn: document.getElementById("mNextBtn"),
    });

    function openModal(){
      const { albumKey, idx } = mainShow.getState();
      modal.classList.add("open");
      modal.setAttribute("aria-hidden", "false");
      modalShow.setAlbum(albumKey);
      modalShow.go(idx);
    }

    function closeModal(){
      modal.classList.remove("open");
      modal.setAttribute("aria-hidden", "true");
    }

    enlargeBtn.addEventListener("click", openModal);
    closeBtn.addEventListener("click", closeModal);

    modal.addEventListener("click", (e) => {
      if (e.target === modal) closeModal();
    });

    window.addEventListener("keydown", (e) => {
      const isOpen = modal.classList.contains("open");
      if (e.key === "Escape" && isOpen) closeModal();
      if (e.key === "ArrowLeft") (isOpen ? modalShow : mainShow).prev();
      if (e.key === "ArrowRight") (isOpen ? modalShow : mainShow).next();
    });
  </script>
</body>
</html>

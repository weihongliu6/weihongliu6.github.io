<div class="intro">

慢门摄影并不是一种技术炫耀，而是一种观看时间的方式。

在长时间曝光中，运动被消解，偶然被过滤，
世界呈现出一种不同于肉眼经验的秩序。

这些影像不是瞬间的记录，
